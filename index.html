<html>
  <head>
    <title> 4º Experiência usando ARJS - Realidade Aumentada usando o modelo 3D do A-Frame com imagem e o marcador Hiro.</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin 0px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-marker type="pattern" url="pattern-pattedi.patt">
       <a-image src="Ceara.jpg" position="0 0 0" rotation="-90 0 0" width="1.4" height="1"></a-image>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
